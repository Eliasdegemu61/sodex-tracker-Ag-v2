name: Supabase Data Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Sync
        run: |
          if [ -z "${{ secrets.SYNC_URL }}" ]; then
            echo "Error: SYNC_URL secret is not set."
            exit 1
          fi
          
          # Retry up to 3 times with a 5-second delay between attempts
          for i in {1..3}; do
            echo "Attempt $i..."
            curl -X POST "${{ secrets.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CACHE_REFRESH_SECRET }}" \
            -H "Content-Type: application/json" \
            -sS --fail-with-body && exit 0 || echo "Attempt $i failed."
            
            sleep 5
          done
          
          echo "All attempts failed."
          exit 1
          
